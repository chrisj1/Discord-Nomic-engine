services:
  nomic:
    build: .
    env_file: .env
    volumes:
      # Bind-mount your local nomic-rules clone so the bot can read/patch rules.py.
      # Override RULES_REPO_PATH in .env if the repos aren't side-by-side.
      - ${RULES_REPO_PATH:-../nomic-rules}:/app/rules:rw
      # Persistent volume for the SQLite database.
      - nomic-data:/app/data
    restart: unless-stopped
    cap_drop:
      - ALL
    # The container runs as root but the bind-mounted rules.py is owned by
    # the host user (uid 1000). Without DAC_OVERRIDE, root gets treated as
    # "other" and can only read — writes (and the git commit on accepted
    # proposals) fail with EACCES.
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

  # Read-only smart-HTTP git server. Players clone via
  # `git clone https://<your-host>/nomic-rules`. Designed to sit behind
  # cloudflared (or any HTTP reverse proxy) for external access — git-http
  # works over standard HTTPS, unlike the raw-TCP `git://` daemon protocol.
  rules-http:
    build:
      context: ./git-http
    volumes:
      # Same bind-mount as the bot, read-only — git-http-backend never writes.
      - ${RULES_REPO_PATH:-../nomic-rules}:/srv/git/nomic-rules:ro
    ports:
      - "8418:8080"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  nomic-data:
