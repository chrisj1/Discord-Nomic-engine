worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events { worker_connections 64; }

http {
    access_log /dev/stdout;
    sendfile on;
    server_tokens off;

    # Upload-pack negotiation request bodies can grow with many refs; 16m is
    # generous for a tiny rules repo. Receive-pack (push) is disabled by
    # git-http-backend default (http.receivepack=false), so no large pushes.
    client_max_body_size 16m;

    server {
        # Non-privileged port so the container can run with cap_drop: ALL
        # (no NET_BIND_SERVICE needed). docker-compose maps host:8418 -> 8080.
        listen 8080 default_server;
        server_name _;

        location / {
            include /etc/nginx/fastcgi_params;
            fastcgi_pass unix:/run/fcgiwrap/fcgiwrap.sock;
            fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /srv/git;
            fastcgi_param PATH_INFO $uri;
            # Streaming responses for clone/fetch — never buffer the whole pack.
            fastcgi_buffering off;
            fastcgi_request_buffering off;
            fastcgi_read_timeout 300s;
        }
    }
}
